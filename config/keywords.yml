# =============================================================
# 召回词表（查全率的单一事实源）
# -------------------------------------------------------------
# 三层召回策略：
#   L1 标题层（title_keywords）：逐词查巨潮标题，按 announcementId 去重。
#      词间命中重叠没有关系，去重成本为零；漏词才是致命的。
#   L2 全文层（fulltext_audit_keywords）：每月自动跑一次全文检索，
#      捞出「正文命中但标题层漏掉」的公告（如董事会决议里夹带套保议案），
#      自动入库进入抽取管线，由 LLM 判定 is_hedge_related 过滤噪音。
#   L3 语义层：LLM 抽取时的 is_hedge_related 判定是最终过滤器，
#      因此 L1/L2 只求召回、不求精确，宁滥勿漏。
#
# 维护原则：发现漏检表述 → 加进 title_keywords 即可，脚本自动生效。
# =============================================================

title_keywords:
  - 套期保值
  - 套保
  - 远期结售汇
  - 外汇衍生品
  - 衍生品交易
  - 商品期货
  - 期货套期
  - 外汇套期
  - 金融衍生品
  - 外汇掉期
  - 远期外汇
  - 商品衍生品
  - 外汇资金交易

# 标题排除（正则）：股权激励类"期权"噪音与已取消公告
title_exclude_pattern: "期权激励|股票期权|限制性股票|已取消"

# 上市期货公司自身的公告会大量命中关键词，按证券代码排除
# 002961瑞达期货 603093南华期货 600927永安期货 001236弘业期货
exclude_sec_codes:
  - "002961"
  - "603093"
  - "600927"
  - "001236"

# L2 全文审计用词（噪音大，只做月度补捞，不做日常主召回）
fulltext_audit_keywords:
  - 套期保值
  - 远期结售汇
  - 外汇衍生品
