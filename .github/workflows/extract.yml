name: Extract Batch (LLM)

# 手动清积压：反复触发直到 pending 清零。抽完自动重建事件层。
on:
  workflow_dispatch:
    inputs:
      limit:
        description: '本次最多抽取条数'
        required: false
        default: '300'
      since:
        description: '只抽该日期后发布的 YYYY-MM-DD（留空抽全部）'
        required: false
      retry_failed:
        description: '同时重试 failed（true/false）'
        required: false
        default: 'false'

concurrency:
  group: extract
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Extract
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          CMD="python scripts/extract_announcements.py --limit ${{ github.event.inputs.limit || '300' }}"
          if [ -n "${{ github.event.inputs.since }}" ]; then CMD="$CMD --since ${{ github.event.inputs.since }}"; fi
          if [ "${{ github.event.inputs.retry_failed }}" = "true" ]; then CMD="$CMD --retry-failed"; fi
          $CMD
      - name: Build events
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/build_events.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extract-${{ github.run_id }}
          path: output/*.csv
          if-no-files-found: ignore
          retention-days: 14
