name: Daily CNINFO Hedging Crawl

on:
  workflow_dispatch:
    inputs:
      days:
        description: '抓取最近几天'
        required: false
        default: '3'
  schedule:
    # UTC 12:30 ≈ 北京时间 20:30。公告晚间较多，可按需调整。
    - cron: '30 12 * * *'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRAWL_DAYS: ${{ github.event.inputs.days || '3' }}
        run: python scripts/ingest_to_supabase.py daily --days "$CRAWL_DAYS"
