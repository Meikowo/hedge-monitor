name: Backfill Announcements (Historical)

# 手动触发：按年份回填历史公告。一年一跑，避免 Actions 超时。
on:
  workflow_dispatch:
    inputs:
      year:
        description: '回填年份 (如 2025)'
        required: true
        default: '2025'
      keywords:
        description: '标题关键词（空格分隔，留空用默认）'
        required: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 小时上限，一年通常够了
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            python scripts/backfill_announcements.py --year "${{ github.event.inputs.year }}" --keywords ${{ github.event.inputs.keywords }}
          else
            python scripts/backfill_announcements.py --year "${{ github.event.inputs.year }}"
          fi
