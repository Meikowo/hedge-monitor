name: Backfill Announcements

# 手动触发：按年份回填历史公告。一年一跑；与其他巨潮任务串行防风控。
on:
  workflow_dispatch:
    inputs:
      year:
        description: '回填年份（如 2026）'
        required: true
        default: '2026'

concurrency:
  group: cninfo
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/fetch_announcements.py backfill --year "${{ github.event.inputs.year }}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backfill-${{ github.event.inputs.year }}-${{ github.run_id }}
          path: output/*.csv
          if-no-files-found: ignore
          retention-days: 30
